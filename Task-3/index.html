<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Temperature Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="converter-card">
    <h2>Temperature Converter</h2>
    
    <div class="form-group">
        <label for="tempInput">Enter Temperature:</label>
        <input type="number" id="tempInput" placeholder="e.g., 25" step="any">
        <div id="errorMsg" class="error">Please enter a valid number.</div>
    </div>
    
    <div class="form-group">
        <label for="fromUnit">From:</label>
        <select id="fromUnit">
            <option value="C">Celsius (°C)</option>
            <option value="F">Fahrenheit (°F)</option>
            <option value="K">Kelvin (K)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="toUnit">To:</label>
        <select id="toUnit">
            <option value="F">Fahrenheit (°F)</option>
            <option value="C" selected>Celsius (°C)</option>
            <option value="K">Kelvin (K)</option>
        </select>
    </div>

    <button id="convertBtn">Convert</button>

    <div class="result-box">
        <p class="result-title">Converted Result</p>
        <p id="resultDisplay" class="result-value">Enter a value and click convert.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
